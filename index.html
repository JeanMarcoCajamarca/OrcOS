<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orcOS Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div id="dashboard">
            <div id="clock">00:00:00</div>
            <div id="weather">Loading weather...</div>
            <div id="date">Wednesday, March 4th, 2026</div>
        </div>

        <div id="app-writer" class="window hidden">
            <div class="window-header">
                <span>Page</span>
                <button onclick="closeApp('app-writer')">X</button>
            </div>
            <div class="window-content">
                <textarea id="doc-editor" placeholder="Start typing or Umah will attack you..."></textarea>
                <button class="save-btn" onclick="saveFile()">Save to Main orcOS Storage</button>
            </div>
        </div>
        <!-- new code for mascot, Jemma, March 5th 2026 
        -->
        <div id="mascot-container">
            <img src="orcOSmascot.png" alt="orcOS Mascot" id="desktop-mascot">
            <div id="welcome-msg">Welcome to orcOS!</div>
        </div>
        <!-- new code for start menu, March 5th 2026 2:35PM
        -->
        <div id="start-menu" class="hidden">
            <div class="menu-header">orcOS v1.0</div>
            <div class="menu-items">
                <button onclick="alert('System is up to date.')">System Update</button>
                <button onclick="toggleSettings()">Personalize</button>
                <button onclick="location.reload()">Restart</button>
                <hr>
                <button onclick="alert('Goodbye, Commander.')">Power Off</button>
        </div>
        </div>
        <div id="taskbar">
            <!-- was previously this code
            <button class="start-btn">Main Menu</button> -->
            <button class="start-btn" onclick="toggleStartMenu()">Main Menu</button>
            <div class="app-icons">
                <button onclick="openApp('app-writer')">Journal</button>
                <button onclick="alert('You got an email from [ADDRESS]')">Email</button>
                <button onclick="toggleSettings()">Change Background Image</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
